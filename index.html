<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#141517" />

  <title>Harshith Mulakala | Founder and Full-Stack Engineer</title>
  <meta name="description" content="Founder and full-stack engineer. I build AI products, ship iOS apps, and founded Basics. Sail through my work or read the classic version." />
  <meta name="author" content="Harshith Mulakala" />
  <link rel="canonical" href="https://www.harshithm.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Harshith Mulakala | Founder and Full-Stack Engineer" />
  <meta property="og:description" content="Founder and full-stack engineer. I build AI products, ship iOS apps, and founded Basics. Sail through my work or read the classic version." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.harshithm.com/" />
  <meta property="og:image" content="./image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Harshith Mulakala | Founder and Full-Stack Engineer" />
  <meta name="twitter:description" content="Founder and full-stack engineer. I build AI products, ship iOS apps, and founded Basics." />
  <meta name="twitter:image" content="./image.png" />

  <link rel="icon" href="./HM.png" />
  <link rel="apple-touch-icon" href="./HM.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" />

  <link rel="stylesheet" href="./css/main.css" />

  <!-- Three.js import map. Must appear before any module script. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Entry gate. Runs before the page below paints so every visitor lands on the
       scroll map loader with no flash of the classic hero. A failsafe reveals the
       classic page if the app never marks itself live, so the scroll can never
       strand a visitor. No em dashes. -->
  <script>
    (function () {
      try {
        document.documentElement.classList.add("auto-entry");
        window.setTimeout(function () {
          if (!document.documentElement.classList.contains("entry-live")) {
            document.documentElement.classList.remove("auto-entry");
          }
        }, 12000);
      } catch (e) {}
    })();
  </script>

  <a class="skip-link" href="#classic-main">Skip to content</a>

  <!-- ===== Auto entry layer: unrolling scroll map loader ===== -->
  <div id="entry" aria-hidden="true">
    <div class="entry-backdrop" aria-hidden="true"></div>
    <div class="scroll" role="status" aria-label="Charting the route">
      <span class="scroll-roll scroll-roll-top" aria-hidden="true"></span>
      <div class="scroll-body">
        <div class="scroll-sheet">
          <div class="scroll-inner">
            <div class="scroll-head">
              <p class="scroll-title">Harshith Mulakala</p>
              <p class="scroll-identity">Founder and full-stack engineer building AI products that ship.</p>
            </div>
            <ul class="scroll-bullets"></ul>
            <div class="scroll-map">
              <svg viewBox="0 0 400 320" role="img" aria-label="A hand drawn chart of the five islands">
              <g class="map-compass" transform="translate(54,52)">
                <circle r="16" fill="none" stroke-width="1.1" />
                <path d="M0,-16 L3.5,-3 L0,0 L-3.5,-3 Z" fill="#4a3826" />
                <path d="M0,16 L3.5,3 L0,0 L-3.5,3 Z" fill="#8a6a45" />
                <path d="M16,0 L3,3.5 L0,0 L3,-3.5 Z" fill="#8a6a45" />
                <path d="M-16,0 L-3,3.5 L0,0 L-3,-3.5 Z" fill="#8a6a45" />
                <text class="map-compass-n" x="0" y="-19" text-anchor="middle">N</text>
              </g>

              <path class="map-wave" d="M150,150 q6,-6 12,0 q6,6 12,0" />
              <path class="map-wave" d="M240,180 q6,-6 12,0 q6,6 12,0" />
              <path class="map-wave" d="M120,255 q6,-6 12,0 q6,6 12,0" />
              <path class="map-wave" d="M250,90 q6,-6 12,0 q6,6 12,0" />

              <path class="route-guide" d="M66,210 L120,96 L212,60 L322,120 L300,238" />
              <path id="entry-route" class="route-progress" d="M66,210 L120,96 L212,60 L322,120 L300,238" />

              <g class="map-isle-group">
                <ellipse class="map-isle-sh" cx="66" cy="216" rx="26" ry="8" />
                <ellipse class="map-isle" cx="66" cy="210" rx="24" ry="13" />
                <text class="map-num" x="66" y="214" text-anchor="middle">I</text>
                <text class="map-name" x="66" y="237" text-anchor="middle">Origins</text>
              </g>
              <g class="map-isle-group">
                <ellipse class="map-isle-sh" cx="120" cy="102" rx="24" ry="8" />
                <ellipse class="map-isle" cx="120" cy="96" rx="22" ry="12" />
                <text class="map-num" x="120" y="100" text-anchor="middle">II</text>
                <text class="map-name" x="120" y="122" text-anchor="middle">The Forge</text>
              </g>
              <g class="map-isle-group">
                <ellipse class="map-isle-sh" cx="212" cy="66" rx="25" ry="8" />
                <ellipse class="map-isle" cx="212" cy="60" rx="23" ry="12" />
                <text class="map-num" x="212" y="64" text-anchor="middle">III</text>
                <text class="map-name" x="212" y="86" text-anchor="middle">The Labors</text>
              </g>
              <g class="map-isle-group">
                <ellipse class="map-isle-sh" cx="322" cy="126" rx="25" ry="8" />
                <ellipse class="map-isle" cx="322" cy="120" rx="23" ry="12" />
                <text class="map-num" x="322" y="124" text-anchor="middle">IV</text>
                <text class="map-name" x="322" y="146" text-anchor="middle">The Voyages</text>
              </g>
              <g class="map-isle-group">
                <ellipse class="map-isle-sh" cx="300" cy="244" rx="25" ry="8" />
                <ellipse class="map-isle" cx="300" cy="238" rx="23" ry="12" />
                <text class="map-num" x="300" y="242" text-anchor="middle">V</text>
                <text class="map-name" x="300" y="264" text-anchor="middle">The Oracle</text>
              </g>

              <g id="entry-ship" class="map-ship" transform="translate(66,210)">
                <path d="M-7,2 L7,2 L4.5,7 L-4.5,7 Z" />
                <rect x="-0.6" y="-9" width="1.2" height="11" />
                <path d="M0.6,-8.5 L6,-2 L0.6,-2 Z" />
              </g>
              </svg>
            </div>
            <div class="scroll-foot">
              <button id="scroll-start" class="scroll-start" type="button" disabled>
                <span class="scroll-start-label">Start Voyage</span>
              </button>
            </div>
          </div>
        </div>
        <div class="scroll-shade" aria-hidden="true">
          <span class="scroll-roll scroll-roll-bottom"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Voyage overlay layer (hidden until body.in-voyage) ===== -->
  <canvas id="voyage-canvas" aria-hidden="true"></canvas>
  <div id="island-labels" aria-hidden="true"></div>
  <div id="dock-prompt" role="status" aria-hidden="true">
    <kbd class="dock-key" hidden>E</kbd>
    <span class="dock-text"></span>
  </div>
  <div id="joystick-zone" aria-hidden="true"></div>

  <div id="hud" aria-hidden="true">
    <div id="compass" aria-hidden="true">
      <div class="compass-scale" aria-hidden="true"></div>
      <div class="compass-ticks"></div>
    </div>
    <p class="hud-controls-hint"></p>
    <div class="hud-controls">
      <button id="btn-mute" type="button" class="hud-btn" aria-label="Turn ambient sound on" aria-pressed="true">
        <span class="hud-btn-glyph" data-glyph="sound"></span>
        <span class="hud-btn-label">Sound off</span>
      </button>
      <button id="btn-exit-voyage" type="button" class="hud-btn" aria-label="View the classic version as a page">
        <span class="hud-btn-glyph" data-glyph="page"></span>
        <span class="hud-btn-label hud-btn-label-full">View as page</span>
        <span class="hud-btn-label hud-btn-label-short" aria-hidden="true">Classic</span>
      </button>
    </div>
    <div id="progress" aria-hidden="true">
      <p class="progress-label">CHAPTER 0 / V</p>
      <div class="progress-dots" aria-hidden="true">
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>
    </div>
  </div>

  <svg id="beat-line" aria-hidden="true" width="100%" height="100%">
    <line class="bl-line" x1="0" y1="0" x2="0" y2="0" />
  </svg>
  <div id="beat-root" aria-hidden="true"></div>

  <div id="toast" role="status" aria-live="polite"></div>
  <div id="panel-root"></div>

  <!-- ===== Classic scrolling page (rendered by ui.js from SITE) ===== -->
  <div id="page">
    <header id="site-header"></header>
    <main id="classic-main"></main>
    <footer id="site-footer"></footer>
  </div>

  <button id="voyage-relaunch" type="button" hidden>
    <span class="vr-star" aria-hidden="true"></span>
    <span class="vr-label">Begin the voyage</span>
  </button>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
